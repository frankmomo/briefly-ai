name: Briefly AI CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  validate:
    name: Validate backend and frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Check backend syntax
        run: npm run check

      - name: Build frontend
        working-directory: web
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: https://api.example.com

  deploy-vercel:
    name: Deploy frontend to Vercel
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_Kw4yw1Kk25f8k9TGezmEOGHL
      VERCEL_PROJECT_ID: prj_7n2mrTE7RYdgOwVkFMsn2d2gH1wY
    steps:
      - uses: actions/checkout@v4

      - name: Pull Vercel project settings
        run: npx vercel@54.9.0 pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web

      - name: Build frontend
        run: npx vercel@54.9.0 build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web

      - name: Deploy frontend
        run: npx vercel@54.9.0 deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
